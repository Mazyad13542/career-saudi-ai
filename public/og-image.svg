<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004a23"/>
      <stop offset="50%" style="stop-color:#006C35"/>
      <stop offset="100%" style="stop-color:#005a2b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A951"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric pattern circles -->
  <circle cx="1050" cy="80"  r="180" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <circle cx="1050" cy="80"  r="120" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <circle cx="1050" cy="80"  r="60"  fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <circle cx="150"  cy="560" r="200" fill="none" stroke="#C8A951" stroke-width="0.5" opacity="0.08"/>
  <circle cx="150"  cy="560" r="130" fill="none" stroke="#C8A951" stroke-width="0.5" opacity="0.08"/>

  <!-- Gold top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#gold)"/>
  <text x="116" y="134" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#004a23" text-anchor="middle">ق</text>

  <!-- Brand name -->
  <text x="174" y="108" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#ffffff" direction="rtl">قِمّة</text>
  <text x="174" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#86efac" direction="rtl">المنصة السعودية للمسيرة المهنية</text>

  <!-- Main headline -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="middle" direction="rtl">طوّر مسيرتك المهنية</text>
  <text x="600" y="365" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="url(#gold)" text-anchor="middle" direction="rtl">ابدأ رحلتك في قِمّة</text>

  <!-- Sub text -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#86efac" text-anchor="middle" direction="rtl">سيرة ذاتية · مقابلات · وظائف · مستشار مهني</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="180" y="480" width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="270" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" direction="rtl">١٥٠+ وظيفة</text>

  <!-- Pill 2 -->
  <rect x="390" y="480" width="200" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="490" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" direction="rtl">ATS Scoring</text>

  <!-- Pill 3 -->
  <rect x="620" y="480" width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="730" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" direction="rtl">مقابلة تجريبية</text>

  <!-- Pill 4 -->
  <rect x="870" y="480" width="160" height="44" rx="22" fill="url(#gold)" fill-opacity="0.9"/>
  <text x="950" y="508" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#004a23" text-anchor="middle" direction="rtl">٩٩ ريال/شهر</text>

  <!-- URL -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">qimma.sa</text>
</svg>
